<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cartoon Duo SVG</title>
</head>

<body style="margin:0;display:flex;justify-content:center;align-items:center;height:100vh;background:#dff6ff;">

<svg width="900" height="500" viewBox="0 0 900 500">

  <!-- Background -->
  <rect width="900" height="500" fill="#dff6ff"/>

  <!-- Ground -->
  <ellipse cx="450" cy="420" rx="300" ry="40" fill="#b8e986" opacity="0.6"/>

  <!-- CHUBBY CHARACTER -->
  <g transform="translate(300,120)">

    <!-- Head -->
    <circle cx="0" cy="0" r="75" fill="#ffd6b0" stroke="#222" stroke-width="3"/>

    <!-- Hair -->
    <path d="M-70,-20 Q0,-100 70,-20 Q0,-40 -70,-20" fill="#2b2b2b"/>

    <!-- Eyes -->
    <circle cx="-25" cy="-10" r="7" fill="#000"/>
    <circle cx="25" cy="-10" r="7" fill="#000"/>

    <!-- Smile -->
    <path d="M-30 25 Q0 55 30 25"
          stroke="#000" stroke-width="4" fill="none" stroke-linecap="round"/>

    <!-- Body -->
    <ellipse cx="0" cy="150" rx="100" ry="110"
             fill="#ff4d4d" stroke="#222" stroke-width="3"/>

    <!-- Arms -->
    <line x1="-90" y1="130" x2="-160" y2="180"
          stroke="#222" stroke-width="12" stroke-linecap="round"/>
    <line x1="90" y1="130" x2="160" y2="180"
          stroke="#222" stroke-width="12" stroke-linecap="round"/>

    <!-- Legs -->
    <line x1="-35" y1="250" x2="-35" y2="340"
          stroke="#222" stroke-width="14" stroke-linecap="round"/>
    <line x1="35" y1="250" x2="35" y2="340"
          stroke="#222" stroke-width="14" stroke-linecap="round"/>
  </g>

  <!-- SLIM CHARACTER -->
  <g transform="translate(600,120)">

    <!-- Head -->
    <ellipse cx="0" cy="0" rx="55" ry="75"
             fill="#ffd6b0" stroke="#222" stroke-width="3"/>

    <!-- Hair -->
    <rect x="-45" y="-75" width="90" height="25" fill="#1f1f1f"/>

    <!-- Eyes -->
    <circle cx="-18" cy="-10" r="6" fill="#000"/>
    <circle cx="18" cy="-10" r="6" fill="#000"/>

    <!-- Glasses -->
    <rect x="-30" y="-20" width="20" height="15" fill="none" stroke="#000" stroke-width="2"/>
    <rect x="10" y="-20" width="20" height="15" fill="none" stroke="#000" stroke-width="2"/>
    <line x1="-10" y1="-10" x2="10" y2="-10" stroke="#000" stroke-width="2"/>

    <!-- Smile -->
    <path d="M-20 30 Q0 45 20 30"
          stroke="#000" stroke-width="3" fill="none"/>

    <!-- Body -->
    <rect x="-40" y="80" width="80" height="160" rx="15"
          fill="#4caf50" stroke="#222" stroke-width="3"/>

    <!-- Arms -->
    <line x1="-40" y1="120" x2="-110" y2="160"
          stroke="#222" stroke-width="10" stroke-linecap="round"/>
    <line x1="40" y1="120" x2="110" y2="160"
          stroke="#222" stroke-width="10" stroke-linecap="round"/>

    <!-- Legs -->
    <line x1="-15" y1="240" x2="-15" y2="340"
          stroke="#222" stroke-width="10" stroke-linecap="round"/>
    <line x1="15" y1="240" x2="15" y2="340"
          stroke="#222" stroke-width="10" stroke-linecap="round"/>

  </g>

</svg>

</body>
</html>
